{% extends "layout.html" %}

{% block content %}
    <!-- Content Header (Page header) -->
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark"><button class="pull-left backbtn" title="Back" onclick="goBack()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                        Income</h1>
                    <script>
                        function goBack() {
                            window.history.back();
                        }
                    </script>
                </div><!-- /.col -->
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item active">Income</li>
                    </ol>
                </div><!-- /.col -->
            </div><!-- /.row -->
        </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->

    <!-- Main content -->
    <section class="content">
        <div class="container-fluid">

            <div class="row">
            </div>

            <div class="row">

                    <div class="col-md-12 col-sm-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Income form</h3>
                                <div class="card-tools">
                                    <button type="button" class="btn btn-tool" data-card-widget="collapse"><i class="fas fa-minus"></i> </button>
                                    <button type="button" class="btn btn-tool" data-card-widget="remove"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                            <!-- /.card-header -->
                            <div class="card-body">
                                <form action="/admin/accounting/new_income" method="post">
                                    <div class="row">
                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Organization <span class="text text-danger">*</span> </label>
                                            <select name="store_id" class="select2 form-control" required style="width: 100%">
                                                <option value="">~Select Store~</option>
                                                {% for store in stores %}
                                                <option value="{{ store.id }}">{{ store.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>

                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Income <span class="text text-danger">*</span> </label>
                                            <select name="account_id" class="select2 form-control" required style="width: 100%">
                                                <option value="">~Select Income Account~</option>
                                                {% for account in accounts %}
                                                <option value="{{ account.id }}">{{ account.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>

                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Income Status <span class="text text-danger">*</span> </label>
                                            <select name="status" class="select2 form-control" required style="width: 100%">
                                                <option value="">~Select Income Status~</option>
                                                <option value="Completed" selected> Completed </option>
                                                <option value="Approved"> Approved </option>
                                                <option value="Pending"> Pending </option>
                                                <option value="Cancelled"> Cancelled </option>
                                            </select>
                                        </div>
                                        
                                        <div class="col-md-3 col-sm-6" style="display: block;">
                                            <label for="">Department </label>
                                            <select name="department_id" class="select2 form-control" style="width: 100%">
                                                <option value="">~Select Department~</option>
                                                {% for dept in departments %}
                                                <option value="{{ dept.id }}">{{ dept.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>

                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Income Amount <span class="text text-danger">*</span> </label>
                                            <input type="number" step="0.01" name="amount" class="form-control" required />
                                        </div>

                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Income Date <span class="text text-danger">*</span> </label>
                                            <input type="date" name="income_date" class="form-control" value="{{ current_date }}" required />
                                        </div>

                                        <div class="col-md-3 col-sm-6">
                                            <label for="">Income By <small>(Customer name)</small> <span class="text text-danger">*</span> </label>
                                            <input type="text" name="customer_name" class="form-control" placeholder="Name of individual/company/inst." required />
                                        </div>


                                        <div class="col-md-12 col-sm-12">
                                            <label for="">Narrative </label>
                                            <textarea name="narrative" id="" class="form-control"></textarea>
                                        </div>

                                        <div class="col-md-12 col-sm-12 mt-2">
                                            <div class="custom-control custom-checkbox">
                                                <input type="checkbox" class="custom-control-input" id="activeCheck" name="is_active" value="1" checked>
                                                <label class="custom-control-label" for="activeCheck">Active</label>
                                            </div>
                                        </div>

                                    </div>

                                    <div class="col-md-12 mt-3 text-right">
                                        <button type="submit" class="btn btn-primary">Submit</button>
                                    </div>
                                </form>
                            </div><!-- /.card-body -->
                        </div>

                    </div>
                
                    <div class="col-md-12 col-sm-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Income List</h3>
                                <div class="card-tools">
                                    <button type="button" class="btn btn-tool" data-card-widget="collapse"><i class="fas fa-minus"></i> </button>
                                    <button type="button" class="btn btn-tool" data-card-widget="remove"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                            <!-- /.card-header -->
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-12 table-responsive">
                                        <table id="data_table" class="table table-striped table-condensed table-sm">
                                            <thead>
                                                <tr class="headings">
                                                    <th>Reference</th>
                                                    <th>Income</th>
                                                    <th>Amount</th>
                                                    <th>Balance</th>
                                                    <th>Customer</th>
                                                    <th>Date</th>
                                                    <th>Status </th>
                                                    <th>Department </th>
                                                    <th>Narrative </th>
                                                    <th>Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div><!-- /.card-body -->
                        </div>

                    </div>
                            </div>

        </div>
        <!--/. container-fluid -->
    </section>
    <!-- /.content -->

<script type="text/javascript">
    $(document).ready(function() {
        $('#data_table').DataTable({
            "processing": true,
            "serverSide": true,
            "pageLength": 10,
            "order": [[ 5, 'desc' ]],
            "ajax": {
                url: "/admin/accounting/all_incomes",
                type: 'GET'
            },
            "columns": [
                { "data": "ref_no" },
                { "data": "account" },
                { "data": "amount" },
                { "data": "balance" },
                { "data": "customer" },
                { "data": "date" },
                { "data": "status" },
                { "data": "department" },
                { "data": "narrative" },
                { "data": "action", "orderable": false }
            ]
        });
    });
</script>
{% endblock %}
