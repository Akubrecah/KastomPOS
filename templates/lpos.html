{% extends "layout.html" %}

{% block content %}
<style>
    .card-header {
        padding: .50rem 1.25rem !important;
    }
</style>

<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">
                    <button class="pull-left backbtn" title="Back" onclick="window.history.back()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                    LPOs
                </h1>
            </div>
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/">Home</a></li>
                    <li class="breadcrumb-item active">LPOs</li>
                </ol>
            </div>
        </div>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12 col-sm-12 col-xs-12">
                <div class="card direct-chat direct-chat-warning">
                    <div class="card-header">
                        <h3 class="card-title">LPO List</h3>
                        <div class="card-tools">
                            <a href="/admin/new-lpo" class="btn btn-dark btn-xs">New LPO <i class="fa fa-plus"></i></a>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="col-md-12"> <br />
                            <table id="data_table" class="table table-striped table-sm table-condensed">
                                <thead>
                                    <tr class="headings">
                                        <th>Bill No</th>
                                        <th>Supplier Name</th>
                                        <th>Date</th>
                                        <th>Due Date</th>
                                        <th>Status</th>
                                        <th>T.Type</th>
                                        <th>Net Amount</th>
                                        <th>Created By</th>
                                        <th>Store</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="orders">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script type="text/javascript">
    $(document).ready(function() {
        $('#data_table').DataTable({
            "pageLength": 40,
            "ajax": {
                url: "/admin/all-lpos",
                type: 'GET'
            },
            "order": [[ 2, 'desc' ]]
        });
    });
</script>
{% endblock %}
