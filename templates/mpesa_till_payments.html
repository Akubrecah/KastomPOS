{% extends "layout.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">
                    <button class="pull-left backbtn" title="Back" onclick="goBack()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                    Mpesa Till Payments</h1>
                <script>
                    function goBack() {
                        window.history.back();
                    }
                </script>
            </div><!-- /.col -->
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/admin">Home</a></li>
                    <li class="breadcrumb-item active">Mpesa Till Payments</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>

<!-- Main content -->
<section class="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-md-12 col-sm-12 col-xs-12">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-12 col-xs-12 table-responsive">
                                <table id="mpesa_table" class="table table-striped table-condensed table-sm">
                                    <thead class="bg-primary">
                                        <tr class="headings">
                                            <th>No.</th>
                                            <th>Reference</th>
                                            <th>Account No.</th>
                                            <th>Amount</th>
                                            <th>Name</th>
                                            <th>Status</th>
                                            <th>Date</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div><!-- /.card-body -->
                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}

{% block scripts %}
<script type="text/javascript">
    $(document).ready(function() {
        $('#mpesa_table').DataTable({
            "processing": true,
            "serverSide": true,
            "responsive": true,
            "autoWidth": false,
            "ajax": {
                url: "/admin/all-mpesa-till-payments-data",
                type: 'GET'
            },
            "columns": [
                { "data": "no" },
                { "data": "reference" },
                { "data": "account_no" },
                { "data": "amount" },
                { "data": "name" },
                { "data": "status" },
                { "data": "date" },
                { "data": "actions", "orderable": false }
            ]
        });
    });

    function mark_paid(id) {
        swal({
            title: "Are you sure?",
            text: "Mark this payment as PAID?",
            icon: "warning",
            buttons: ["No", "Yes"],
        }).then((willMark) => {
            if (willMark) {
                $.ajax({
                    url: '/admin/mpesa-payment-paid',
                    type: 'POST',
                    data: { id: id },
                    success: function(resp) {
                        if (resp.trim() == "success") {
                            toastr["success"]("Payment marked as PAID");
                            location.reload();
                        } else {
                            toastr["error"]("Failed to update status");
                        }
                    }
                });
            }
        });
    }
</script>
{% endblock %}
