{% extends "layout.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">
                    <button class="pull-left backbtn" title="Back" onclick="goBack()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                    Banquets</h1>
                <script>
                    function goBack() {
                        window.history.back();
                    }
                </script>
            </div><!-- /.col -->
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/admin">Home</a></li>
                    <li class="breadcrumb-item active">Banquets</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>

<!-- Main content -->
<section class="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-md-12 col-sm-12 col-xs-12">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 col-sm-12">
                <div class="card card-outline">
                    <div class="card-body">
                        <form id="filter_form" method="GET">
                            <div class="row">
                                <div class="col-md-12 text-info">
                                    Filter by date range
                                </div>
                                <div class="col-md-3">
                                    <label>Org/Branch/Store <i class="text-danger">*</i></label>
                                    <select class="form-control" name="org_id" id="org_id">
                                        <option value="All">Select option</option>
                                        {% for store in stores %}
                                        <option value="{{ store.id }}">{{ store.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-3 col-sm-6 col-xs-12">
                                    <label> From Date <i class="fa fa-calendar"></i> *</label>
                                    <input type="date" name="from_date" id="from_date" class="form-control" value="" required />
                                </div>
                                <div class="col-md-3 col-sm-6 col-xs-12">
                                    <label> To Date <i class="fa fa-calendar"></i> *</label>
                                    <input type="date" name="to_date" id="to_date" class="form-control" value="" required />
                                </div>
                                <div class="col-md-3 col-xs-12">
                                    <button type="button" onclick="refresh_table()" style="margin-top: 30px;" class="btn btn-rgp">Filter <i class="fa fa-filter"></i></button>
                                </div>
                            </div>
                        </form>
                    </div><!-- /.card-body -->
                </div>
            </div>

            <div class="col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">List view</h3>
                        <div class="card-tools">
                            <a href="/admin/new-banquet" class="btn btn-dark btn-xs">New Banquet</a>
                            <a href="/admin/banquet-calendar" class="btn btn-dark btn-xs">Calendar View <i class="fa fa-calendar"></i></a>
                        </div>
                    </div>
                    <!-- /.card-header -->
                    <div class="card-body">
                        <div class="col-md-12"> <br />
                            <table id="data_table" class="table table-striped table-sm jambo_table">
                                <thead>
                                    <tr class="headings">
                                        <th>#S/N</th>
                                        <th>Bill No</th>
                                        <th>Customer Name</th>
                                        <th>Contact details</th>
                                        <th>Date</th>
                                        <th>Taxes(KES)</th>
                                        <th>TT Amount(KES)</th>
                                        <th>Created by</th>
                                        <th class="no-link last"><span class="nobr">Action</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </div><!-- /.card-body -->
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .jambo_table thead {
        background: #2A3F54;
        color: white;
    }

    </style>
{% endblock %}

{% block scripts %}
<script type="text/javascript">
    var dataTable;
    $(document).ready(function() {
        dataTable = $('#data_table').DataTable({
            "pageLength": 40,
            "processing": true,
            "serverSide": true,
            "responsive": true,
            "order": [[4, 'desc']],
            "ajax": {
                url: "/admin/all-banquet-data",
                type: 'GET',
                data: function(d) {
                    d.from_date = $('#from_date').val();
                    d.to_date = $('#to_date').val();
                    d.org_id = $('#org_id').val();
                }
            },
            "columns": [
                { "data": "serial" },
                { "data": "bill_no" },
                { "data": "customer" },
                { "data": "contact" },
                { "data": "date" },
                { "data": "taxes" },
                { "data": "total" },
                { "data": "created_by" },
                { "data": "actions", "orderable": false }
            ]
        });
    });

    function refresh_table() {
        dataTable.ajax.reload();
    }
</script>
{% endblock %}
