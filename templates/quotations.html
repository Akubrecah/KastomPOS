{% extends "layout.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">
                    <button class="pull-left backbtn" title="Back" onclick="goBack()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                    Quotations</h1>
                <script>
                    function goBack() {
                        window.history.back();
                    }
                </script>
            </div><!-- /.col -->
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/admin">Home</a></li>
                    <li class="breadcrumb-item active">Quotations</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>

<!-- Main content -->
<section class="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-md-12 col-sm-12 col-xs-12">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Quotations List</h3>
                        <div class="card-tools">
                            <a href="/admin/new-quotation" class="btn btn-dark btn-xs">New Quote</a>
                        </div>
                    </div>
                    <!-- /.card-header -->
                    <div class="card-body">
                        <div class="col-md-12"> <br />
                            <table id="data_table" class="table table-striped table-sm jambo_table">
                                <thead>
                                    <tr class="headings">
                                        <th>#S/N</th>
                                        <th>Bill No</th>
                                        <th>Customer Name</th>
                                        <th>Contact details</th>
                                        <th>Date</th>
                                        <th>Taxes(KES)</th>
                                        <th>TT Amount(KES)</th>
                                        <th>Created By</th>
                                        <th class="no-link last"><span class="nobr">Action</span></th>
                                    </tr>
                                </thead>
                                <tbody id="orders">
                                </tbody>
                            </table>
                        </div>
                    </div><!-- /.card-body -->
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .jambo_table thead {
        background: #2A3F54;
        color: white;
    }
</style>
{% endblock %}

{% block scripts %}
<script type="text/javascript">
    $(document).ready(function() {
        $('#data_table').DataTable({
            "pageLength": 40,
            "processing": true,
            "serverSide": true,
            "responsive": true,
            "order": [[4, 'desc']],
            "ajax": {
                url: "/admin/all-quotations-data",
                type: 'GET',
            },
            "columns": [
                { "data": "serial" },
                { "data": "bill_no" },
                { "data": "customer" },
                { "data": "contact" },
                { "data": "date" },
                { "data": "taxes" },
                { "data": "total" },
                { "data": "created_by" },
                { "data": "actions", "orderable": false }
            ]
        });
    });
</script>
{% endblock %}
