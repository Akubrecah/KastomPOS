{% extends "layout.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">
                    <button class="pull-left backbtn" title="Back" onclick="goBack()"><i class="fa fa-arrow-left" aria-hidden="true"> </i></button>
                    Mpesa Callbacks</h1>
                <script>
                    function goBack() {
                        window.history.back();
                    }
                </script>
            </div><!-- /.col -->
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/admin">Home</a></li>
                    <li class="breadcrumb-item active">Mpesa Callbacks</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>

<!-- Main content -->
<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12 col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-12 col-xs-12 table-responsive">
                                <table id="callback_table" class="table table-striped table-sm table-hover">
                                    <thead class="bg-primary">
                                        <tr class="headings">
                                            <th>#S/N</th>
                                            <th>M-Pesa Code</th>
                                            <th>Order Code</th>
                                            <th>Amount</th>
                                            <th>Phone</th>
                                            <th>Customer Name</th>
                                            <th>Status</th>
                                            <th>Date</th>
                                        </tr>
                                    </thead>
                                    <tbody id="orders">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div><!-- /.card-body -->
                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}

{% block scripts %}
<script type="text/javascript">
    $(document).ready(function() {
        $('#callback_table').DataTable({
            "processing": true,
            "serverSide": true,
            "ajax": {
                url: "/admin/all-mpesa-callbacks-data",
                type: 'GET'
            },
            "columns": [
                { "data": "sn" },
                { "data": "mpesa_code" },
                { "data": "order_code" },
                { "data": "amount" },
                { "data": "phone" },
                { "data": "name" },
                { "data": "status" },
                { "data": "date" }
            ]
        });
    });
</script>
{% endblock %}
