{% extends "layout.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">{{ title }}</h1>
            </div>
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="/">Home</a></li>
                    <li class="breadcrumb-item active">{{ title }}</li>
                </ol>
            </div>
        </div>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <div class="card card-outline card-info">
                    <div class="card-header">
                        <h3 class="card-title">{{ title }} Management</h3>
                    </div>
                    <div class="card-body text-center py-5">
                        <i class="fas fa-tools fa-5x text-muted mb-4"></i>
                        <h2 class="text-muted">Under Development</h2>
                        <p class="lead">The <strong>{{ title }}</strong> module is currently being implemented. Check back soon!</p>
                        <a href="/inventory" class="btn btn-primary mt-3">
                            <i class="fas fa-arrow-left"></i> Back to Items
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
